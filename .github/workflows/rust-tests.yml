name: Rust Tests

on:
  push:
    branches: [ main, feature/settings-preferences ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: [ 'rustfmt', 'clippy' ]
          override: true

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf build-essential

      - name: Run cargo test
        run: cd src-tauri && cargo test
